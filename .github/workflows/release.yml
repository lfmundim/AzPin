name: Release

on:
  push:
    branches:
      - 'release/v*'

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer

      - name: Install tooling
        run: |
          brew install xcbeautify create-dmg
          dotnet tool install -g nbgv
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Compute version
        id: version
        run: |
          MAJOR="${GITHUB_REF_NAME#release/v}"
          NBGV=$(nbgv get-version -f json)
          MINOR=$(echo "$NBGV" | jq -r '.VersionMinor')
          HEIGHT=$(echo "$NBGV" | jq -r '.VersionHeight')
          VERSION="${MAJOR}.${MINOR}.${HEIGHT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git ls-remote --tags origin "${{ steps.version.outputs.tag }}" | grep -q .; then
            git tag "${{ steps.version.outputs.tag }}"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}" "${{ steps.version.outputs.tag }}"
          fi

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Archive
        run: |
          xcodebuild -scheme AzPin \
            -configuration Release \
            -archivePath build/AzPin.xcarchive \
            CODE_SIGN_IDENTITY="${{ secrets.APPLE_DEVELOPER_ID }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            archive | xcbeautify

      - name: Export .app
        run: |
          xcodebuild -exportArchive \
            -archivePath build/AzPin.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            | xcbeautify

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent build/export/AzPin.app build/AzPin.zip
          xcrun notarytool submit build/AzPin.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple build/export/AzPin.app

      - name: Create DMG
        run: |
          create-dmg \
            --volname "AzPin" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "AzPin.app" 150 185 \
            --hide-extension "AzPin.app" \
            --app-drop-link 450 185 \
            "AzPin-${{ steps.version.outputs.version }}.dmg" \
            "build/export/"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "AzPin ${{ steps.version.outputs.version }}" \
            --generate-notes \
            "AzPin-${{ steps.version.outputs.version }}.dmg"
